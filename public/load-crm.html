<!DOCTYPE html>
<html>
<head><title>Loading CRM data...</title></head>
<body>
<p id="status">Loading 379 contacts...</p>
<script>
const STORAGE_KEY = "diagonal-thinking-crm-records";
const today = new Date().toISOString().slice(0, 10);

fetch("/crm-import-data.json")
  .then(r => r.json())
  .then(records => {
    const withIds = records.map(r => ({
      ...r,
      id: r.id || crypto.randomUUID(),
      dateAdded: r.dateAdded || today,
      lastUpdated: r.lastUpdated || today,
      services: Array.isArray(r.services) ? r.services : [],
      projectedValue: Number(r.projectedValue) || 0,
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(withIds));
    document.getElementById("status").textContent = "Loaded " + withIds.length + " contacts. Redirecting...";
    setTimeout(() => { window.location.href = "/"; }, 800);
  })
  .catch(e => {
    document.getElementById("status").textContent = "Error: " + e.message;
  });
</script>
</body>
</html>
